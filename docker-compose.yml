version: "3.8"

services:
  frontend:
    build:
      context: .
      args:
        # API (FastAPI) на sakhatype.ru; фронт часто на api.sakhatype.ru — не путать с URL API.
        VITE_API_URL: https://sakhatype.ru
        VITE_SITE_URL: https://api.sakhatype.ru
    container_name: sakhatype-front
    restart: always
    ports:
      - "80:80"
